dataset_configs:
  desc: Dataset Configurations
  value:
    dataset_path: "./dataset/plantpathology/"

training_hyperparameters:
  desc: Training Hyperparameters
  value:
    batch_size: 32
    num_epochs: 5
    learning_rate: 0.001
    weight_decay: 0.0001
    warmup_steps: 4000

experiment_details:
  desc: Experiment Details
  value:
    model_dir: "./trained_models/"
    experiment_name: "test_local_process_end_to_end"
    use_wandb: True

plant_label_encoding:
  desc: Plant Label Encoding
  value:
    "healthy": 0
    "scab": 1
    "rust": 2
    "frog_eye_leaf_spot": 3
    "powdery_mildew": 4

OOD_datasets:
  desc: Out-of-Distribution Datasets
  value:
    "stanfordcars": "./dataset/stanfordcars/"
    "flowers102": "./dataset/flowers102/"
    "dtd": "./dataset/dtd/"

wandb_config:
  desc: Weights and Biases Configuration
  value:
    project: "OOD_Exploration"
    entity: "deveshshah-university-of-michigan"
    mode: "online"
    config: {}
